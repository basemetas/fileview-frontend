name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------
      # Node 环境
      # -------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      # -------------------------
      # 读取 package.json version
      # -------------------------
      - name: Get package version
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # -------------------------
      # 获取当前 tag
      # -------------------------
      - name: Get tag version
        id: tag
        run: |
          RAW_TAG=${GITHUB_REF#refs/tags/}
          TAG=${RAW_TAG#v}
          echo "raw_tag=$RAW_TAG" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # -------------------------
      # 校验 tag 格式 vX.Y.Z
      # -------------------------
      - name: Validate tag format
        run: |
          if [[ ! "${{ steps.tag.outputs.raw_tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid tag format. Use vX.Y.Z"
            exit 1
          fi

      # -------------------------
      # 校验版本一致
      # -------------------------
      - name: Validate version match
        run: |
          if [ "${{ steps.pkg.outputs.version }}" != "${{ steps.tag.outputs.tag }}" ]; then
            echo "❌ Tag version does not match package.json version"
            exit 1
          fi
          echo "✅ Version matched"

      # -------------------------
      # 构建
      # -------------------------
      - name: Build
        run: npm run build

      # -------------------------
      # 清理旧包
      # -------------------------
      - name: Clean old artifacts
        run: rm -f fileview-frontend-*.zip

      # -------------------------
      # 打包 dist
      # -------------------------
      - name: Zip dist
        run: |
          zip -r fileview-frontend-v${{ steps.pkg.outputs.version }}.zip dist

      # -------------------------
      # 生成 SHA256
      # -------------------------
      - name: Generate SHA256
        run: |
          sha256sum fileview-frontend-v${{ steps.pkg.outputs.version }}.zip \
            > fileview-frontend-v${{ steps.pkg.outputs.version }}.zip.sha256

      # -------------------------
      # 生成 CHANGELOG
      # -------------------------
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %s" > CHANGELOG.md
          else
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s" > CHANGELOG.md
          fi

          echo "" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "Build Time: $(date -u)" >> CHANGELOG.md

      # -------------------------
      # 创建 Release
      # -------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: v${{ steps.pkg.outputs.version }}
          body_path: CHANGELOG.md
          files: |
            fileview-frontend-v${{ steps.pkg.outputs.version }}.zip
            fileview-frontend-v${{ steps.pkg.outputs.version }}.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}